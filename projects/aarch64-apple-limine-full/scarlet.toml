schema_version = 2

[project]
name = "scarlet-aarch64-apple-limine-full"

[bsp]
path = "bsp"
package = "scarlet"

[bsp.kernel]
source = { path = "../../kernel" }
# Currently, the hypervisor feature is disabled for Apple Silicon
features = { network = true, user-fpu = true, user-vector = true, hypervisor = false, limine = true }

[modules]
"scarlet-module-prototype" = { path = "../../modules/scarlet-module-prototype", enabled = true }
"scarlet-driver-apple-efuse" = { path = "../../drivers/nvmem/apple-efuse", enabled = true }
"scarlet-driver-apple-wdt" = { path = "../../drivers/watchdog/apple-wdt", enabled = true }
"scarlet-driver-apple-pinctrl" = { path = "../../drivers/gpio/apple-pinctrl", enabled = true }
"scarlet-driver-apple-i2c" = { path = "../../drivers/i2c/apple-i2c", enabled = true }
"scarlet-driver-apple-nco" = { path = "../../drivers/clk/apple-nco", enabled = true }
"scarlet-driver-apple-admac" = { path = "../../drivers/dma/apple-admac", enabled = true }
"scarlet-driver-apple-mca" = { path = "../../drivers/audio/apple-mca", enabled = true }
"scarlet-driver-cs42l83" = { path = "../../drivers/audio/cs42l83", enabled = true }
"scarlet-driver-tas5770l" = { path = "../../drivers/audio/tas5770l", enabled = true }
"scarlet-driver-s5l-uart" = { path = "../../drivers/uart/s5l-uart", enabled = true }
"scarlet-driver-apple-aic" = { path = "../../drivers/pic/apple-aic", enabled = true }
"scarlet-driver-apple-msi" = { path = "../../drivers/pic/apple-msi", enabled = true }
"scarlet-driver-apple-atcphy" = { path = "../../drivers/phy/apple-atcphy", enabled = true }
"scarlet-driver-apple-cd321x" = { path = "../../drivers/usb/typec/apple-cd321x", enabled = true }
"scarlet-driver-apple-pmgr" = { path = "../../drivers/soc/apple-pmgr", enabled = true }
"scarlet-driver-apple-asc" = { path = "../../drivers/soc/apple-asc", enabled = true }
"scarlet-driver-apple-rtkit" = { path = "../../drivers/soc/apple-rtkit", enabled = true }
"scarlet-driver-apple-smc" = { path = "../../drivers/soc/apple-smc", enabled = true }
"scarlet-driver-apple-spmi" = { path = "../../drivers/spmi/apple-spmi", enabled = true }
"scarlet-driver-apple-afk" = { path = "../../drivers/soc/apple-afk", enabled = true }
"scarlet-driver-apple-epic" = { path = "../../drivers/soc/apple-epic", enabled = true }
"scarlet-driver-apple-dart" = { path = "../../drivers/iommu/apple-dart", enabled = true }
"scarlet-driver-apple-avd" = { path = "../../drivers/video/apple-avd", enabled = true }
"scarlet-driver-apple-dwc3" = { path = "../../drivers/usb/dwc3/apple-dwc3", enabled = true }
"scarlet-driver-apple-pcie" = { path = "../../drivers/pcie/apple-pcie", enabled = true }
"scarlet-driver-apple-spi" = { path = "../../drivers/spi/apple-spi", enabled = true }
"scarlet-driver-apple-spi-hid" = { path = "../../drivers/spi/apple-spi-hid", enabled = true }
"scarlet-driver-dpxbar" = { path = "../../drivers/display/dpxbar", enabled = true }
"scarlet-driver-dcp" = { path = "../../drivers/display/dcp", enabled = false }
"scarlet-driver-dcpext" = { path = "../../drivers/display/dcpext", enabled = true }

[images]

[images.initramfs]
format = "newc"
output = ".scarlet/images/initramfs-aarch64-apple-full.cpio"

[[images.initramfs.layers]]
kind = "bundle"
path = "../../bundles/desktop/bundle.toml"

[images.rootfs]
format = "ext2"
output = ".scarlet/images/rootfs-aarch64-apple-full.ext2"

[[images.rootfs.layers]]
kind = "bundle"
path = "../../bundles/full/bundle.toml"

[[images.rootfs.layers]]
kind = "copy"
source = "rootfs"
to = "/"

[images.boot]
format = "limine-uefi"
output = ".scarlet/images/limine-aarch64-apple-full.img"
cmdline = "console=ttyS0 root=/dev/usbblk0p1 rootfstype=ext2"
deps = ["initramfs"]

[[images.boot.layers]]
kind = "image"
source = "initramfs"
to = "/boot/initramfs"

[images.usb-rootfs]
format = "gpt"
output = ".scarlet/images/usb-rootfs-aarch64-apple-full.img"
deps = ["rootfs"]

[[images.usb-rootfs.partitions]]
source = "rootfs"
name = "SCARLET_ROOT"
type = "linux-filesystem"

[runner]
command = "tools/deploy_m1n1_usb.py"
